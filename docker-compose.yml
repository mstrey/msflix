networks:
  frontend:
    name: frontend
    external: true
  backend:
    external: true

services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    networks:
      - frontend
    restart: unless-stopped
    user: 1000:1000
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - ${JF_CONFIG}:/config
      - ${STORAGE_TVSHOWS}:/data/tvshows
      - ${STORAGE_MOVIES}:/data/movies
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.services.${SERVICE}.loadbalancer.server.port=8096"
      - "traefik.http.routers.${SERVICE}.rule=Host(`${SERVICE}.${DOMAIN}`)"
      - "traefik.http.routers.${SERVICE}.entrypoints=web"      
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3    

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - WEBUI_PORT=8080
    volumes:
      - ${BIT_CONFIG}/qbittorrent:/config
      - ${STORAGE_RAIZ}/downloads:/data/downloads
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - ${PROWLAR_CONFIG}/prowlarr:/config
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - ${RADARR_CONFIG}/radarr:/config
      - ${STORAGE_RAIZ}:/data
    networks:
      - backend
    restart: unless-stopped
    depends_on:
      qbittorrent:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - ${SONARR_CONFIG}/sonarr:/config
      - ${STORAGE_RAIZ}:/data
    networks:
      - backend
    restart: unless-stopped
    depends_on:
      qbittorrent:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - ${BAZARR_CONFIG}/bazarr:/config
      - ${STORAGE_RAIZ}:/data
    networks:
      - backend
    restart: unless-stopped
    depends_on:
      radarr:
        condition: service_healthy
      sonarr:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:6767/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - ${JELLYSEERR_CONFIG}/jellyseerr:/app/config
    networks:
      - frontend
      - backend
    restart: unless-stopped
    depends_on:
      radarr:
        condition: service_healthy
      sonarr:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.jellyseerr.rule=Host(`${SERVICE}-pedidos.${DOMAIN}`)"
      - "traefik.http.routers.jellyseerr.entrypoints=web"
      - "traefik.http.services.jellyseerr.loadbalancer.server.port=5055"
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:5055/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
